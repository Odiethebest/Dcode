# Dcode production compose stack.
# Public surface: frontend only. The nginx frontend proxies `/api/*` to the
# internal API service, so the browser never needs direct access to api:8000.

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dcode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcode}
      POSTGRES_DB: ${POSTGRES_DB:-dcode}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcode}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dcode}:${POSTGRES_PASSWORD:-dcode}@postgres:5432/${POSTGRES_DB:-dcode}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      AGENT_URL: http://agent:8001
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://dcode.odieyang.com}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dcode}:${POSTGRES_PASSWORD:-dcode}@postgres:5432/${POSTGRES_DB:-dcode}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-stub}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      WORKDIR_BASE: /tmp/dcode-workdirs
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - repo_workdirs:/tmp/dcode-workdirs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: infra/docker/agent.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dcode}:${POSTGRES_PASSWORD:-dcode}@postgres:5432/${POSTGRES_DB:-dcode}
      REDIS_URL: redis://redis:6379/0
      JUDGE_MODEL: ${JUDGE_MODEL:-stub}
      RERANKER_ENDPOINT: ${RERANKER_ENDPOINT:-http://localhost:9999}
      RETRIEVAL_BASE_URL: http://api:8000
      WORKDIR_BASE: /tmp/dcode-workdirs
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - repo_workdirs:/tmp/dcode-workdirs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  repo_workdirs:
