name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (lint + typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Sync workspace
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check apps packages
      - name: Typecheck (mypy --strict)
        run: uv run mypy apps packages
      - name: Test (pytest)
        run: uv run pytest

  frontend:
    name: Frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test -- --run
