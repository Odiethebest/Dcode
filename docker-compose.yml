# Dcode service orchestration. See README.md for the 5-minute guide.
# Copy `.env.example` to `.env` before boot so credentials and internal
# service auth are explicit rather than silently defaulted.

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcode}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?set RABBITMQ_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:?set RABBITMQ_USER in .env}:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      AGENT_URL: http://agent:8001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?set INTERNAL_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:?set RABBITMQ_USER in .env}:${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD in .env}@rabbitmq:5672/
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-stub}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://host.docker.internal:8002}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-4}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-12}
      WORKDIR_BASE: /tmp/dcode-workdirs
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?set INTERNAL_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - repo_workdirs:/tmp/dcode-workdirs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  embedding:
    build:
      context: .
      dockerfile: infra/docker/embedding.Dockerfile
    environment:
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL:-jinaai/jina-embeddings-v2-base-code}
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    ports:
      - "8002:8002"
    profiles:
      - embedding
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8002/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  agent:
    build:
      context: .
      dockerfile: infra/docker/agent.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}
      REDIS_URL: redis://redis:6379/0
      JUDGE_MODEL: ${JUDGE_MODEL:-stub}
      RERANKER_ENDPOINT: ${RERANKER_ENDPOINT:-http://localhost:9999}
      RETRIEVAL_BASE_URL: http://api:8000
      WORKDIR_BASE: /tmp/dcode-workdirs
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?set INTERNAL_API_KEY in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8001:8001"
    volumes:
      - repo_workdirs:/tmp/dcode-workdirs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  repo_workdirs:
